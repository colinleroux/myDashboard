{% extends "layout.html" %}
{% block title %}Log: {{ filename }}{% endblock %}
{% block content %}
<section class="panel">
  <h1>{{ filename }}</h1>
  <p><a href="{{ url_for('main.logs') }}" class="btn btn-ghost">Back to logs</a></p>
  <pre class="log-content">{{ content }}</pre>
</section>
{% endblock %}
