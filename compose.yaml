services:
  web:
    build:
      context: .
      target: backend
    container_name: internal-site-launcher-web
    environment:
      FLASK_APP: wsgi_app.py
      SECRET_KEY: change-me
      SQLALCHEMY_DATABASE_URI: sqlite:////app/instance/app.db
      PYTHONUNBUFFERED: "1"
    expose:
      - "8000"
    volumes:
      - /mnt/data/apps/ControlWebsite/instance:/app/instance
    command: >
      sh -c "flask --app wsgi_app.py init-db &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 --threads 4 --timeout 60 wsgi_app:application"
    restart: unless-stopped

  nginx:
    build:
      context: .
      target: nginx
    container_name: internal-site-launcher-nginx
    depends_on:
      - web
    ports:
      # Change to "80:80" when you want standard HTTP on host port 80.
      - "10002:80"
    restart: unless-stopped
